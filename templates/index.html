<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zevoir TaskBot</title>

  <!-- Distinctive fonts: Clash Display for headings, Figtree for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>

  <!-- ╔══════════════════════════════════════════╗
       ║           MAIN CHAT CONTAINER            ║
       ╚══════════════════════════════════════════╝ -->
  <div class="chat-shell">

    <!-- ── HEADER ── -->
    <header class="chat-header">

      <!-- Left: avatar + name + status -->
      <div class="header-left">
        <div class="bot-avatar" aria-label="Zevoir TaskBot avatar">Z</div>
        <div class="header-meta">
          <h1 class="bot-name">Zevoir TaskBot</h1>
          <span class="status-row">
            <span class="status-dot" aria-hidden="true"></span>
            <span class="status-text">Online</span>
          </span>
        </div>
      </div>

      <!-- Right: dark-mode toggle + clear button -->
      <div class="header-right">
        <!-- Dark / Light mode toggle -->
        <button class="icon-btn" id="themeToggle" title="Toggle dark / light mode" aria-label="Toggle theme">
          <!-- Moon icon (shown in dark mode) -->
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <!-- Sun icon (shown in light mode) -->
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>

        <!-- Clear chat -->
        <button class="icon-btn clear-icon-btn" id="clearBtn" title="Clear chat" aria-label="Clear chat history">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          <span>Clear</span>
        </button>
      </div>

    </header><!-- /chat-header -->


    <!-- ── MESSAGES AREA ── -->
    <main class="chat-messages" id="chatMessages" role="log" aria-live="polite">
      <!-- Messages are injected here by script.js -->
    </main>


    <!-- ── TYPING INDICATOR (hidden until bot is fetching) ── -->
    <div class="typing-wrap" id="typingWrap" aria-hidden="true">
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>
      <p class="typing-label">Bot is typing…</p>
    </div>


    <!-- ── CHARACTER COUNT ── -->
    <div class="char-bar">
      <span id="charCount">0</span>&thinsp;/&thinsp;250
    </div>


    <!-- ── INPUT AREA ── -->
    <footer class="chat-footer">
      <input
        type="text"
        id="userInput"
        class="chat-input"
        placeholder="Enter a message…"
        maxlength="250"
        autocomplete="off"
        aria-label="Message input"
      />
      <button class="send-btn" id="sendBtn" title="Send" aria-label="Send message">
        <!-- Paper-plane icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </footer>

  </div><!-- /chat-shell -->

  <script src="/static/script.js"></script>
</body>
</html>
